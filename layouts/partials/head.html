<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
{{ if .IsHome }}
{{ .Site.Title }}
{{ else }}
{{ .Title }} | {{ .Site.Title }}
{{ end }}
</title>

<link rel="canonical" href="{{ .Permalink }}">

<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">

<link rel="icon" type="image/x-icon" href="/assets/static-pic/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/static-pic/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/static-pic/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/static-pic/favicon/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="/assets/static-pic/favicon/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/assets/static-pic/favicon/android-chrome-512x512.png">
<link rel="manifest" href="/assets/static-pic/favicon/site.webmanifest">


<link rel="stylesheet" href="/assets/css/structure.css">
<link rel="stylesheet" href="/assets/css/style.css">
<link rel="stylesheet" href="/assets/css/threads.css">

</head>
