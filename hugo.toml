baseURL = "https://os.cs12.ir"
languageCode = "fa-ir"
# بهتره که به این شکل باشه : اسم مبحث + به سبک تِرِد 
# مثلا : شبکه به سبک تِرِد
title = "سیستم عامل به سبک تِرِد"

# ===========================================
# تنظیمات کلی سایت
# ===========================================

[params]
# توضیح کوتاه برای کل سایت بیشتر بدرد seo میخوره
description = "یادگیری مفاهیم سیستم عامل به سبک تِرِد"
threads_preview_count = 5
threads_chap_count_per_page = 2

[params.banner]
# مثلا سیستم عامل یا شبکه
subject = "سیستم عامل"

# ===========================================
# تنظیمات دارک مود
# enabled = true: دکمه تغییر تم نمایش داده میشه
# enabled = false: دکمه تغییر تم مخفیه (حالت پیش‌فرض)
# فعلا اینیبل نکنید...
# ===========================================

[params.dark_mode]
enabled = false

# ===========================================
# متن لایسنس پیش‌فرض مطالب
# این متن توی صفحه تکی هر ترد نمایش داده میشه
# کاراکتر {license} با مقدار license از frontmatter جایگزین میشه
# ===========================================

[params.license]
text = "⚖️ مگه میشه مطلبی بدون لایسنس آخه؟ لایسنس این مطلب : {license}"

# ===========================================
# اطلاعات نویسنده اصلی سایت
# ===========================================

[params.author]
name = "فرزاد"
# بیوگرافی کوتاه نویسنده که زیر اسمش نمایش داده میشه
bio = "سلام👋 فرزاد هستم دانشجوی رشته کامپیوتر. علاقه مند به کامپیوتر ها، برنامه نویسی و لینوکس🐧"
# آدرس عکس پروفایل نویسنده 
avatar = "/assets/static-pic/avatar.png"
# لینک صفحه دونیت یا حمایت مالی
donate_url = "https://www.coffeebede.com/farzadoxo"

# ===========================================
# لینک‌های شبکه‌های اجتماعی نویسنده (اختیاری)
# این لینک‌ها در پروفایل نویسنده نمایش داده میشن
# ===========================================

[params.author.social]
# لیست لینک‌های شبکه‌های اجتماعی
# هر آیتم شامل name و url هست
# مثال: {name = "github", url = "https://github.com/user"}

social_links = [
  {name = "GitHub", url = "https://github.com/farzadoxo"},
  {name = "Telegram", url = "https://t.me/farzadoxo"},
  {name = "LinkedIn", url = "https://linkedin.com/in/f-ebrahimi"}
]

# ===========================================
# متن‌های مدال (پنجره‌های بازشونده)
# این متن‌ها وقتی کاربر روی آیکون‌ها کلیک میکنه نمایش داده میشن
# ===========================================

[params.modal]
# متن عنوان مدال وقتی هنوز تردی منتشر نشده
empty_title = "هنوز هیچ تردی منتشر نشده!"
# متن توضیحات مدال وقتی هنوز تردی منتشر نشده
empty_text = "از یکشنبه اولین تردها رو شروع میکنم. پس فعلاً فقط آماده باش :)"
# متن دکمه کپی لینک در مدال اشتراک‌گذاری
copy_link_text = "کپی لینک"
# متن بعد از کپی شدن لینک
copied_text = "کپی شد"

# ===========================================
# متن‌های مرتبط با ترد (پست‌ها)
# این متن‌ها توی صفحه تکی ترد و لیست تردها استفاده میشن
# ===========================================

[params.thread]
# متنی که بعد از خوندن یک ترد نمایش داده میشه
read_message = "شما این تِرِد رو مطالعه کردید آفرین.🍻"
# متن دکمه "خواندی؟ کلیک کن"
mark_read_text = "خوندی؟ کلیک کن"
# متن دکمه بعد از کلیک (یعنی ترد خوانده شده)
marked_read_text = "خونده نشده"
# متن عنوان مدال تبریک بعد از خوندن ترد
congrats_title = "تبریک عرض مینمایم 🎉"
# متن مدال تبریک (کاراکتر {count} با تعداد تردهای خوانده شده جایگزین میشه)
congrats_text = "تا الان {count} ترد خوندی بنازمتتتت 😃"
# متن اشتراک‌گذاری (کاراکتر {title} با عنوان ترد جایگزین میشه)
share_text = "سلام دوستان! ترد '{title}' رو بخونید، خیلی مفیده"
# تعداد ترد در هر صفحه مربوط به اون فصل مثلا : /threads/chapter1
threads_per_page = 5
# آدرس عکس تبریک (بعد از خوندن ترد)
congrats_image = "static/assets/static-pic/congrat.gif"

# ===========================================
# دست نزن به این بخش برادر من خب...
# ===========================================

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# ===========================================
# تنظیمات گیت‌هاب
# برای لینک‌های "ویرایش در گیت‌هاب" و "مشاهده منبع" استفاده میشه
# ===========================================

[params.github]
# آدرس ریپو گیت هابتون رو این شکلی بزارید :  username/repo-name
repo = "The-CS12/os-course"
# برنچ اصلی رو هم بزارید...
branch = "main"

# ===========================================
# تنظیمات سیستم نظرات
# برای فعال‌سازی، اول باید گیسکاس رو در گیت‌هاب فعال کنید
# به سایت زیر برید و مرحله به مرحله کارایی که گفته رو انجام بدید تا اسکریپت مورد نظر رو بهتون بده
# https://giscus.app
# ===========================================

[params.giscus]
# اسکریپتی که از giscus گرفتید رو اینجا پیست کنید
script = '''
<script src="https://giscus.app/client.js"
        data-repo="The-CS12/os-course"
        data-repo-id="R_kgDOTGzO3g"
        data-category-id="DIC_kwDOTGzO3s4DAALG"
        data-mapping="og:title"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="top"
        data-theme="preferred_color_scheme"
        data-lang="en"
        data-loading="lazy"
        crossorigin="anonymous"
        async>
</script>
'''

